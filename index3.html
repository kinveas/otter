<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc Học Tập - Hình Nhân 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        /* === NỀN KẸO BÔNG === */
        body, html {
            margin: 0; padding: 0;
            background: linear-gradient(-45deg, #fff0f5, #ffe4e1, #e0f7fa, #f3e5f5);
            background-size: 400% 400%;
            animation: breatheBg 15s ease infinite;
            color: #5d4037; font-family: 'Quicksand', sans-serif;
            overflow-x: hidden; display: block;
        }
        @keyframes breatheBg { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        #sakura-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .main-layout { position: relative; z-index: 1; padding: 100px 20px 60px 20px; display: flex; justify-content: center; }

        /* Nút quay lại */
        .back-btn {
            position: fixed; top: 40px; left: 40px; color: #ff8fa3; text-decoration: none; font-weight: 800; font-size: 1.1rem;
            display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.75); backdrop-filter: blur(12px);
            padding: 10px 22px; border-radius: 30px; box-shadow: 0 4px 15px rgba(255,143,163,0.15); transition: all 0.3s ease; z-index: 100;
        }
        .back-btn:hover { background: #fff; transform: translateX(-5px); box-shadow: 0 6px 20px rgba(255,143,163,0.3); }

        /* === WRAPPER & OVERLAY === */
        .bento-wrapper { position: relative; width: 100%; max-width: 1100px; height: 700px; overflow: hidden; transition: height 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .fade-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 350px;
            background: linear-gradient(to bottom, rgba(255,240,245,0) 0%, rgba(255,236,242,0.6) 40%, rgba(255,234,240,0.96) 75%, rgba(255,233,239,1) 100%);
            display: flex; justify-content: center; align-items: flex-end; padding-bottom: 20px; z-index: 20; transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .fade-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .btn-expand {
            background: linear-gradient(135deg, #ff9a9e, #fecfef); color: #fff; padding: 16px 30px; font-size: 1.1rem; font-weight: 800;
            font-family: inherit; border-radius: 50px; cursor: pointer; border: none; box-shadow: 0 10px 25px rgba(255,154,158,0.4); transition: transform 0.3s ease, box-shadow 0.3s ease; margin: 0 10px;
        }
        .btn-expand.add-sub { background: linear-gradient(135deg, #a1c4fd, #c2e9fb); color: #5d4037; box-shadow: 0 10px 25px rgba(161,196,253,0.4); }
        .btn-expand:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(255,154,158,0.6); }
        .btn-expand.add-sub:hover { box-shadow: 0 15px 35px rgba(161,196,253,0.6); }

        /* === BENTO GRID === */
        .bento-container { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); grid-auto-rows: minmax(260px, auto); gap: 24px; }
        .bento-card {
            border-radius: 36px; padding: 35px; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between;
            cursor: pointer; box-shadow: 0 10px 30px rgba(255,192,203,0.2); transition: box-shadow 0.4s ease, transform 0.4s ease; opacity: 1; transform: translateY(0); border: 2px solid rgba(255,255,255,0.4);
        }
        .hidden-card { opacity: 0; pointer-events: none; }
        .entrance-anim { animation: slideUpFade 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(80px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes cuteBounce { 0%, 100% { transform: translateY(-8px); } 50% { transform: translateY(-12px); } }
        .bento-card:hover { animation: cuteBounce 1s ease-in-out infinite; box-shadow: 0 20px 40px rgba(255,143,163,0.3); z-index: 5; }

        /* Màu Card */
        .card-major { grid-column: span 2; background: linear-gradient(135deg, #ffafbd, #ffc3a0); color: #fff; animation-delay: 0.1s; }
        .card-english { grid-column: span 1; background: linear-gradient(135deg, #fbc2eb, #a6c1ee); color: #fff; animation-delay: 0.2s; }
        .card-finance { grid-column: span 1; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); animation-delay: 0.3s; }
        .card-mindset { grid-column: span 1; background: #fff0f5; border: 2px solid #ffb7b2; animation-delay: 0.4s; }
        .card-volleyball { grid-column: span 1; grid-row: span 2; background: linear-gradient(135deg, #a1c4fd, #c2e9fb); color: #fff; animation-delay: 0.5s; }
        .card-startup { grid-column: span 2; background: linear-gradient(135deg, #84fab0, #8fd3f4); color: #fff; animation-delay: 0.6s; }
        .card-grooming { grid-column: span 1; background: #ffdac1; }
        .card-career { grid-column: span 2; background: linear-gradient(135deg, #e0c3fc, #8ec5fc); color: #fff; }
        .card-gym { grid-column: span 1; background: #ffb7b2; color: #fff; }
        .card-tools { grid-column: span 1; background: #b5ead7; }
        .card-2030 { grid-column: span 2; background: rgba(255,255,255,0.8); }
        .card-dc { grid-column: span 2; background: #d5aaaf; color: #fff; }

        /* Typography */
        .tag { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.85; margin-bottom: 10px; display: block; }
        .title { font-size: 1.8rem; font-weight: 800; line-height: 1.2; margin: 0 0 10px 0; letter-spacing: -0.5px; }
        .desc { font-size: 1rem; opacity: 0.9; margin: 0; line-height: 1.5; max-width: 90%; }
        .card-english .desc, .card-finance .desc, .card-mindset .desc, .card-grooming .desc, .card-gym .desc, .card-tools .desc { display: none; }
        .card-english .title, .card-finance .title, .card-mindset .title, .card-grooming .title, .card-gym .title, .card-tools .title { font-size: 1.5rem; }

        /* Nút hành động góc dưới */
        .action-btn {
            position: absolute; bottom: 25px; right: 25px; width: 45px; height: 45px; border-radius: 50%;
            background: rgba(255,255,255,0.4); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center;
            overflow: hidden; transition: all 0.4s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.05); color: #5d4037;
        }
        .action-btn .plus { position: absolute; font-size: 24px; font-weight: 700; transition: transform 0.4s ease, opacity 0.4s ease; }
        .action-btn .arrow { position: absolute; font-size: 14px; font-weight: bold; transform: translateX(-40px); opacity: 0; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease; }
        .bento-card:hover .action-btn { background: #fff; color: #ff8fa3; transform: scale(1.1); box-shadow: 0 8px 20px rgba(255,143,163,0.3); }
        .bento-card:hover .plus { transform: scale(0) rotate(90deg); opacity: 0; }
        .bento-card:hover .arrow { transform: translateX(0); opacity: 1; }
        .del-action:hover .action-btn { background: #ff6b6b !important; color: white !important; }

        /* === MODALS === */
        .modal-backdrop {
            position: fixed; inset: 0; background: rgba(255, 236, 242, 0.85); backdrop-filter: blur(10px); z-index: 500;
            display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .modal-backdrop.open { opacity: 1; visibility: visible; }
        .modal {
            background: #fff; border: 2px solid rgba(255, 182, 193, 0.4); box-shadow: 0 20px 50px rgba(255, 143, 163, 0.2);
            border-radius: 28px; padding: 36px; width: 100%; max-width: 480px;
            transform: translateY(30px) scale(0.96); transition: transform 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        .modal-backdrop.open .modal { transform: translateY(0) scale(1); }
        .modal h2 { margin: 0 0 24px; font-size: 1.6rem; font-weight: 800; color: #ff8fa3; }

        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 0.85rem; font-weight: 800; color: #a88; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
        .form-input {
            width: 100%; padding: 12px 16px; background: #fff0f5; border: 1px solid #ffdae0;
            border-radius: 14px; outline: none; color: #5d4037; font-family: inherit; font-size: 0.95rem; font-weight: 600; transition: all 0.25s;
            box-sizing: border-box;
        }
        .form-input:focus { border-color: #ff8fa3; background: #fff; box-shadow: 0 0 0 4px rgba(255, 143, 163, 0.15); }

        /* Upload File UI — Drag & Drop Zone */
        .file-upload-box {
            border: 2px dashed #ffdae0; border-radius: 14px; padding: 24px 20px; text-align: center;
            background: #fffafa; cursor: pointer; transition: all 0.25s; position: relative;
            user-select: none;
        }
        .file-upload-box:hover, .file-upload-box.drag-over {
            border-color: #ff8fa3; background: #fff0f5;
            box-shadow: 0 0 0 4px rgba(255,143,163,0.12);
        }
        .file-upload-box.drag-over { transform: scale(1.01); }
        .file-upload-box input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        .upload-zone-icon { font-size: 2rem; display: block; margin-bottom: 6px; }
        .upload-zone-text { font-size: 0.9rem; font-weight: 700; color: #c9a5b1; }
        .upload-zone-hint { font-size: 0.78rem; color: #ddb8c4; margin-top: 4px; font-weight: 600; }

        /* Queue: danh sách file đã chọn chờ upload */
        .file-queue { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
        .queue-item {
            display: flex; align-items: center; gap: 10px;
            background: #fff0f5; border: 1px solid #ffdae0; border-radius: 10px;
            padding: 8px 12px; font-size: 0.85rem; font-weight: 700;
        }
        .queue-item-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #5d4037; }
        .queue-item-size { font-size: 0.75rem; color: #c9a5b1; white-space: nowrap; }
        .queue-item-remove { background: none; border: none; color: #ff8fa3; cursor: pointer; font-size: 1rem; padding: 0 4px; flex-shrink: 0; }
        .queue-item-status { font-size: 0.8rem; white-space: nowrap; }

        /* Progress bar upload — per-file */
        .upload-progress-wrap { display: none; margin-top: 10px; }
        .upload-progress-wrap.show { display: block; }
        .upload-progress-bar-bg { background: #ffdae0; border-radius: 10px; height: 8px; overflow: hidden; }
        .upload-progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #ff9a9e, #fecfef); border-radius: 10px; transition: width 0.25s ease; }
        .upload-status-text { font-size: 0.8rem; color: #ff8fa3; font-weight: 700; margin-top: 6px; text-align: center; }

        /* File List trong Modal Chi Tiết */
        .file-list { margin-top: 15px; max-height: 250px; overflow-y: auto; padding-right: 5px; }
        .file-item {
            display: flex; align-items: center; justify-content: space-between;
            background: #fff0f5; padding: 12px 15px; border-radius: 12px; margin-bottom: 10px;
            font-size: 0.9rem; font-weight: 700; border: 1px solid #ffdae0;
            transition: background 0.2s;
        }
        .file-item:hover { background: #ffe4ec; }
        .file-item-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
        .file-item-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #5d4037; max-width: 220px; }
        .file-item a { color: #5d4037; text-decoration: none; display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
        .file-item a:hover { color: #ff8fa3; }
        .file-item-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .file-download-btn, .del-file-btn {
            background: none; border: none; cursor: pointer; font-size: 1rem; padding: 4px 8px;
            border-radius: 8px; transition: background 0.2s;
        }
        .file-download-btn { color: #26d0ce; }
        .file-download-btn:hover { background: rgba(38,208,206,0.12); }
        .folder-download-btn { background: none; border: none; color: #74b9ff; cursor: pointer; font-size: 1rem; padding: 3px 7px; border-radius: 7px; transition: all 0.2s; }
        .folder-download-btn:hover { background: rgba(116,185,255,0.12); color: #0984e3; }
        .del-file-btn { color: #ff6b6b; }
        .del-file-btn:hover { background: rgba(255,107,107,0.12); }

        /* File size badge */
        .file-size { font-size: 0.75rem; color: #c9a5b1; font-weight: 600; white-space: nowrap; }

        /* Spinner loading */
        .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid rgba(255,143,163,0.3); border-top-color: #ff8fa3; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast thông báo */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: #fff; border: 2px solid #ffdae0; border-radius: 20px; padding: 14px 24px;
            font-weight: 800; color: #5d4037; box-shadow: 0 10px 30px rgba(255,143,163,0.25);
            z-index: 9999; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            opacity: 0; white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { border-color: #84fab0; }
        .toast.error { border-color: #ff9a9e; color: #c0392b; }

        /* Empty state */
        .empty-state { text-align: center; padding: 30px 20px; opacity: 0.65; font-size: 0.95rem; line-height: 1.7; }

        /* === BREADCRUMB === */
        .breadcrumb {
            display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
            font-size: 0.82rem; font-weight: 800; margin-bottom: 10px;
            color: #c9a5b1;
        }
        .breadcrumb-item {
            cursor: pointer; color: #ff8fa3; transition: opacity 0.2s;
            background: none; border: none; font-family: inherit; font-size: inherit; font-weight: inherit; padding: 2px 4px; border-radius: 6px;
        }
        .breadcrumb-item:hover { background: #fff0f5; }
        .breadcrumb-item.active { color: #5d4037; cursor: default; }
        .breadcrumb-item.active:hover { background: none; }
        .breadcrumb-sep { color: #e8c4cc; font-size: 0.75rem; }

        /* === TOOLBAR === */
        .file-toolbar {
            display: flex; gap: 8px; margin-bottom: 10px; align-items: center;
        }
        .toolbar-btn {
            padding: 7px 14px; border-radius: 20px; border: 1.5px solid #ffdae0;
            background: #fff; color: #ff8fa3; font-family: inherit; font-size: 0.82rem;
            font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 5px;
            transition: all 0.2s; white-space: nowrap;
        }
        .toolbar-btn:hover { background: #fff0f5; border-color: #ff8fa3; }

        /* === FOLDER ITEM === */
        .folder-item {
            display: flex; align-items: center; justify-content: space-between;
            background: linear-gradient(135deg,rgba(255,240,245,0.9),rgba(255,228,236,0.7));
            padding: 11px 15px; border-radius: 12px; margin-bottom: 8px;
            font-size: 0.9rem; font-weight: 700; border: 1.5px solid #ffdae0;
            cursor: pointer; transition: all 0.2s;
        }
        .folder-item:hover { background: linear-gradient(135deg,#fff0f5,#ffe4ec); border-color: #ff8fa3; transform: translateX(3px); }
        .folder-item-left { display: flex; align-items: center; gap: 8px; color: #e07090; }
        .folder-item-name { color: #5d4037; font-weight: 800; }
        .folder-item-actions { display: flex; gap: 4px; }
        .folder-del-btn { background: none; border: none; color: #ffb3c1; cursor: pointer; font-size: 1rem; padding: 3px 7px; border-radius: 7px; transition: all 0.2s; }
        .folder-del-btn:hover { background: rgba(255,107,107,0.12); color: #ff6b6b; }

        /* Inline tạo thư mục mới */
        .new-folder-row {
            display: flex; gap: 8px; align-items: center; margin-bottom: 10px;
            background: #fff0f5; border: 1.5px dashed #ff8fa3; border-radius: 12px; padding: 8px 12px;
        }
        .new-folder-input {
            flex: 1; background: transparent; border: none; outline: none;
            font-family: inherit; font-size: 0.9rem; font-weight: 700; color: #5d4037;
        }
        .new-folder-input::placeholder { color: #e8c4cc; }
        .new-folder-confirm { background: #ff8fa3; color: #fff; border: none; border-radius: 8px; padding: 5px 12px; font-family: inherit; font-weight: 800; cursor: pointer; font-size: 0.85rem; }
        .new-folder-confirm:hover { background: #ff6fa0; }
        .new-folder-cancel { background: none; border: none; color: #e8c4cc; cursor: pointer; font-size: 1.1rem; }

        /* Modal actions */
        .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
        .modal-btn {
            flex: 1; padding: 12px; border-radius: 14px; font-family: inherit; font-size: 0.95rem; font-weight: 800; cursor: pointer; border: none; transition: all 0.2s;
        }
        .btn-cancel { background: #ffe4e1; color: #a88; }
        .btn-cancel:hover { background: #ffdae0; }
        .btn-submit { background: linear-gradient(135deg, #ff9a9e, #fecfef); color: #fff; box-shadow: 0 6px 15px rgba(255, 143, 163, 0.3); }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255, 143, 163, 0.4); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255, 143, 163, 0.3); border-radius: 3px; }

        @media (max-width: 900px) {
            .bento-container { grid-template-columns: 1fr; grid-auto-rows: minmax(200px, auto); }
            .bento-card { grid-column: span 1 !important; grid-row: span 1 !important; }
            .bento-wrapper { height: 1000px; }
        }
    </style>
</head>
<body>

<canvas id="sakura-canvas"></canvas>
<a href="index2.html" class="back-btn">← Trạm Giao Điểm 🦦</a>

<div class="main-layout">
    <div class="bento-wrapper" id="bentoWrapper">
        <div class="bento-container" id="mainGrid">
            </div>

        <div class="fade-overlay" id="fadeOverlay">
            <button class="btn-expand" id="btnExpand">Mở rộng không gian 🌸</button>
            <button class="btn-expand add-sub" id="btnAddSubject">+ Thêm Môn 📚</button>
        </div>
    </div>
</div>

<div class="modal-backdrop" id="modalAddSubject">
    <div class="modal">
        <h2>✨ Thêm Không Gian Mới</h2>
        <div class="form-group">
            <label class="form-label">Tên Môn / Chủ đề</label>
            <input class="form-input" id="inputSubTitle" type="text" placeholder="VD: Lịch sử Đảng">
        </div>
        <div class="form-group">
            <label class="form-label">Phân loại (Tag)</label>
            <input class="form-input" id="inputSubTag" type="text" placeholder="VD: Đại cương">
        </div>
        <div class="modal-actions">
            <button class="modal-btn btn-cancel" onclick="closeModals()">Hủy</button>
            <button class="modal-btn btn-submit" id="btnSaveSubject" onclick="saveNewSubject()">Tạo mới 🌸</button>
        </div>
    </div>
</div>

<div class="modal-backdrop" id="modalSubjectDetail">
    <div class="modal" style="max-width:520px;">
        <h2 id="detailTitle">Tên Môn Học</h2>

        <div class="breadcrumb" id="breadcrumb"></div>

        <div class="file-toolbar">
            <button class="toolbar-btn" onclick="toggleNewFolderRow()">📁 Tạo thư mục</button>
            <button class="toolbar-btn" onclick="toggleUploadPanel()">⬆️ Tải file lên</button>
        </div>

        <div class="new-folder-row" id="newFolderRow" style="display:none;">
            <span>📁</span>
            <input class="new-folder-input" id="newFolderInput" type="text" placeholder="Tên thư mục mới..." maxlength="60">
            <button class="new-folder-confirm" onclick="createFolder()">Tạo</button>
            <button class="new-folder-cancel" onclick="toggleNewFolderRow()">×</button>
        </div>

        <div id="uploadPanel" style="display:none; margin-bottom:12px;">
            <div class="file-upload-box" id="dropZoneMore">
                <input type="file" id="inputUploadMoreFile" multiple>
                <span class="upload-zone-icon">☁️</span>
                <span class="upload-zone-text">Kéo thả hoặc nhấn để chọn file</span>
                <span class="upload-zone-hint">Mọi loại file • Chọn nhiều cùng lúc</span>
            </div>
            <div class="file-queue" id="queueMore"></div>
            <div class="upload-progress-wrap" id="moreFileProgress">
                <div class="upload-progress-bar-bg"><div class="upload-progress-bar" id="moreFileBar"></div></div>
                <div class="upload-status-text" id="moreFileStatus"></div>
            </div>
            <button class="modal-btn btn-submit" id="btnUploadMore" onclick="uploadMoreFile()" style="margin-top: 8px; width: 100%;">
                ☁️ Tải lên
            </button>
        </div>

        <div class="form-label" id="fileListLabel">Nội dung thư mục</div>
        <div class="file-list" id="detailFileList" style="max-height:280px;">
            <div class="empty-state">Đang tải... 🦦</div>
        </div>

        <div class="modal-actions">
            <button class="modal-btn btn-cancel" onclick="closeModals()">Đóng</button>
        </div>
    </div>
</div>

<div class="toast" id="toastMsg"></div>

<script>
/* ================================================================
   HÀM XỬ LÝ CHUỖI CHO SUPABASE (XÓA DẤU TIẾNG VIỆT ĐỂ LÀM KEY)
   ================================================================ */
function sanitizeForSupabase(str) {
    if (!str) return "";
    str = str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    str = str.replace(/đ/g, "d").replace(/Đ/g, "D");
    str = str.replace(/\s+/g, "_");
    str = str.replace(/[^a-zA-Z0-9\-_.]/g, "");
    return str;
}

(function () {
    const canvas = document.getElementById('sakura-canvas');
    const ctx = canvas.getContext('2d');
    const FALL_SPEED = 50; const PETAL_COUNT = 38;
    const COLORS = ['rgba(255,182,193,0.85)', 'rgba(255,160,180,0.80)', 'rgba(255,200,210,0.75)', 'rgba(252,220,230,0.70)', 'rgba(255,145,175,0.80)', 'rgba(248,200,215,0.65)'];
    let W, H, petals = [];
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    function createPetal(startY) { return { x: Math.random() * W, y: startY !== undefined ? startY : Math.random() * -H, rx: 7 + Math.random() * 7, ry: 4 + Math.random() * 4, rot: Math.random() * Math.PI * 2, vy: FALL_SPEED * (0.85 + Math.random() * 0.3), swingAmp: 18 + Math.random() * 22, swingFreq: 0.4 + Math.random() * 0.5, swingOff: Math.random() * Math.PI * 2, rotSpeed: (Math.random() - 0.5) * 1.2, color: COLORS[Math.floor(Math.random() * COLORS.length)], t: Math.random() * 10 }; }
    function init() { resize(); petals = []; for (let i = 0; i < PETAL_COUNT; i++) petals.push(createPetal(Math.random() * H)); }
    let last = null;
    function draw(ts) {
        if (!last) last = ts; const dt = Math.min((ts - last) / 1000, 0.05); last = ts;
        ctx.clearRect(0, 0, W, H);
        petals.forEach(p => {
            p.t += dt; p.y += p.vy * dt; p.rot += p.rotSpeed * dt;
            const swing = Math.sin(p.t * p.swingFreq * Math.PI * 2 + p.swingOff) * p.swingAmp; const drawX = p.x + swing;
            if (p.y - p.ry > H) { Object.assign(p, createPetal(-20)); p.t = 0; return; }
            ctx.save(); ctx.translate(drawX, p.y); ctx.rotate(p.rot); ctx.beginPath(); ctx.ellipse(0, 0, p.rx, p.ry, 0, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.fill(); ctx.strokeStyle = 'rgba(220,130,150,0.25)'; ctx.lineWidth = 0.5; ctx.stroke(); ctx.restore();
        }); requestAnimationFrame(draw);
    }
    window.addEventListener('resize', resize); init(); requestAnimationFrame(draw);
})();

function formatBytes(bytes) {
    if (!bytes) return '';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}
function getFileIcon(name) {
    const ext = name.split('.').pop().toLowerCase();
    const icons = { pdf: '📄', doc: '📝', docx: '📝', xls: '📊', xlsx: '📊', ppt: '📑', pptx: '📑', jpg: '🖼️', jpeg: '🖼️', png: '🖼️', zip: '🗜️', rar: '🗜️' };
    return icons[ext] || '📄';
}

    if (parentId === null) {
        query = query.is('parent_id', null);
    } else {
        query = query.eq('parent_id', parentId);
    }

    const { data, error } = await query.order('is_folder', { ascending: false }).order('name', { ascending: true });

    if (error) { listDiv.innerHTML = `<div class="empty-state">❌ Lỗi: ${error.message}</div>`; return; }

            html += `

        } else {
            const size = formatBytes(item.file_size);
            html += `
            <div class="file-item">
                <div class="file-item-left"><span>${getFileIcon(item.name)}</span><span class="file-item-name" title="${item.name}">${item.name}</span>${size ? `<span class="file-size">${size}</span>` : ''}</div>

window.deleteFolder = async function(folderId, folderName, e) {
    e.stopPropagation();
    if (!confirm(`Xóa toàn bộ thư mục "${folderName}"?\nLưu ý: Hành động này xóa vĩnh viễn mọi file bên trong.`)) return;
    showToast('Đang quét file để xóa...');

    // Đệ quy lấy tất cả file con trong DB để xóa vật lý trên Storage trước
    async function getAllStoragePaths(parentId) {
        let paths = [];
        const { data } = await sb.from('file_manager').select('id, is_folder, storage_path').eq('parent_id', parentId);
        if (data) {
            for (let item of data) {
                if (item.is_folder) {
                    const childPaths = await getAllStoragePaths(item.id);
                    paths = paths.concat(childPaths);
                } else if (item.storage_path) {
                    paths.push(item.storage_path);
                }
            }
        }
        return paths;
    }

    const pathsToDelete = await getAllStoragePaths(folderId);
    if (pathsToDelete.length > 0) {
        // Xóa lô (batch delete) trên Storage
        await sb.storage.from(BUCKET_NAME).remove(pathsToDelete);
    }

    // Xóa Thư mục trên DB (nhờ CASCADE, nó tự xóa mọi record con)
    await sb.from('file_manager').delete().eq('id', folderId);

    showToast(`✅ Đã xóa "${folderName}"!`, 'success');
    await renderFileManager();
};

/* ================================================================
   TẢI TOÀN BỘ THƯ MỤC (ZIP BẰNG JSZIP)
   ================================================================ */
window.downloadFolder = async function(folderId, folderName, e) {
    e.stopPropagation();
    showToast('Đang chuẩn bị gói dữ liệu. Chờ xíu nhé... 📦');

    const zip = new JSZip();
    let fileCount = 0;

    // Đệ quy chui vào từng thư mục để tải file và đưa vào cây thư mục của JSZip
    async function addFilesToZip(currentFolderId, currentZipFolder) {
        const { data } = await sb.from('file_manager').select('*').eq('parent_id', currentFolderId);
        if (!data) return;

        for (const item of data) {
            if (item.is_folder) {
                // Tạo thư mục bên trong file ZIP
                const subZipFolder = currentZipFolder.folder(item.name);
                await addFilesToZip(item.id, subZipFolder);
            } else {
                // Lấy link tải và fetch Blob
                const { data: urlData } = await sb.storage.from(BUCKET_NAME).createSignedUrl(item.storage_path, 3600);
                if (urlData) {
                    try {
                        const response = await fetch(urlData.signedUrl);
                        const blob = await response.blob();
                        currentZipFolder.file(item.name, blob);
                        fileCount++;
                    } catch (err) { console.error("Lỗi tải file:", item.name); }
                }
            }
        }
    }

    await addFilesToZip(folderId, zip);

    if (fileCount === 0) {
        showToast('Thư mục này rỗng, không có gì để nén cả 🦦', 'error'); return;
    }

    showToast(`Đang nén ${fileCount} file... 🗜️`);
    zip.generateAsync({ type: "blob" }).then(function(content) {
        saveAs(content, `${folderName}.zip`);
        showToast('✅ Đã tải file ZIP!', 'success');
    });
};

/* ================================================================
   MODAL: THÊM MÔN (Không kèm file)
   ================================================================ */
document.getElementById('btnAddSubject').addEventListener('click', () => { document.getElementById('modalAddSubject').classList.add('open'); });
window.saveNewSubject = function () {
    const title = document.getElementById('inputSubTitle').value.trim();
    const tag   = document.getElementById('inputSubTag').value.trim() || 'Môn học';
    if (!title) { showToast('Nhập tên môn học nhé! 🌸', 'error'); return; }

    dynamicSubjects.push({ id: Date.now(), title, tag });
    localStorage.setItem('hinhnhan_subjects', JSON.stringify(dynamicSubjects));

    closeModals(); renderAllSubjects(); showToast(`✅ Đã tạo "${title}"!`, 'success');
    if (!document.getElementById('fadeOverlay').classList.contains('hidden')) document.getElementById('btnExpand').click();
};
window.deleteSubject = function (id, e) {
    e.stopPropagation();
    if (confirm('Xóa môn học này?\n(Lưu ý: Xóa trên giao diện, file trong Database vẫn còn)')) {
        dynamicSubjects = dynamicSubjects.filter(s => s.id !== id);
        localStorage.setItem('hinhnhan_subjects', JSON.stringify(dynamicSubjects));
        renderAllSubjects(); showToast('✅ Đã xóa môn học!', 'success');
    }
};

function closeModals() {
    document.querySelectorAll('.modal-backdrop').forEach(m => m.classList.remove('open'));
    document.getElementById('inputSubTitle').value = ''; document.getElementById('inputSubTag').value = '';
    queueMore.length = 0; renderQueue();
}

renderAllSubjects();
</script>
</body>
</html>
