<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rạp Chiếu Phim - Hình Nhân 🍿</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;800&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #1a1a2e);
            background-size: 400% 400%;
            animation: bgShift 18s ease infinite;
            color: #f0e6ff;
            font-family: 'Quicksand', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes bgShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* === STARS BG === */
        #star-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        /* === LAYOUT === */
        .page-wrap {
            position: relative; z-index: 1;
            max-width: 1000px; margin: 0 auto;
            padding: 80px 24px 80px;
        }

        /* === NÚT QUAY LẠI === */
        .back-btn {
            position: fixed; top: 30px; left: 30px;
            color: #c9b8ff; text-decoration: none;
            font-weight: 800; font-size: 1rem;
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            padding: 10px 20px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.12);
            transition: all 0.3s ease; z-index: 100;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: translateX(-4px);
        }

        /* === HEADER === */
        .page-header {
            text-align: center;
            margin-bottom: 48px;
        }
        .page-header .emoji-big {
            font-size: 3.5rem;
            display: block;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
            margin-bottom: 12px;
        }
        @keyframes popIn {
            0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg);   opacity: 1; }
        }
        .page-header h1 {
            font-size: 2.8rem; font-weight: 800;
            margin: 0 0 8px;
            background: linear-gradient(135deg, #fbc2eb, #a6c1ee, #ffecd2);
            background-size: 200% auto;
            -webkit-background-clip: text; color: transparent;
            animation: shimmer 4s linear infinite;
        }
        @keyframes shimmer { to { background-position: 200% center; } }
        .page-header p { font-size: 1rem; opacity: 0.6; margin: 0; }

        /* === STATS BAR === */
        .stats-bar {
            display: flex; justify-content: center; gap: 16px;
            margin-bottom: 36px; flex-wrap: wrap;
        }
        .stat-pill {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px; padding: 8px 20px;
            font-size: 0.85rem; font-weight: 700;
            display: flex; align-items: center; gap: 6px;
            transition: background 0.3s;
        }
        .stat-pill:hover { background: rgba(255,255,255,0.14); }
        .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-all     { background: #c9b8ff; }
        .dot-watch   { background: #fbc2eb; }
        .dot-watched { background: #84fab0; }
        .dot-fav     { background: #ffd96a; }

        /* === SEARCH & FILTER === */
        .controls {
            display: flex; gap: 12px; margin-bottom: 32px;
            flex-wrap: wrap; align-items: center;
        }
        .search-wrap { flex: 1; min-width: 220px; position: relative; }
        .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 1.1rem; opacity: 0.5; }
        .search-input {
            width: 100%; padding: 14px 16px 14px 44px;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 50px; outline: none; color: #f0e6ff; font-family: inherit; font-size: 1rem; font-weight: 600;
            transition: all 0.3s ease; backdrop-filter: blur(10px);
        }
        .search-input:focus { border-color: rgba(201,184,255,0.5); background: rgba(255,255,255,0.12); box-shadow: 0 0 0 4px rgba(201,184,255,0.12); }
        .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .filter-btn {
            padding: 10px 18px; border-radius: 50px; font-size: 0.85rem; font-weight: 800; font-family: inherit; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.07); color: rgba(240,230,255,0.7); transition: all 0.25s ease;
        }
        .filter-btn:hover { background: rgba(255,255,255,0.13); }
        .filter-btn.active { background: rgba(201,184,255,0.25); border-color: rgba(201,184,255,0.5); color: #e0d4ff; }
        .add-btn {
            padding: 12px 22px; border-radius: 50px; font-size: 0.9rem; font-weight: 800; font-family: inherit; cursor: pointer; border: none;
            background: linear-gradient(135deg, #fbc2eb, #a6c1ee); color: #2a1a4e; box-shadow: 0 6px 20px rgba(251,194,235,0.25); transition: all 0.3s ease; white-space: nowrap;
        }
        .add-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(251,194,235,0.4); }

        /* === GENRE TAGS === */
        .genre-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
        .genre-tag {
            padding: 6px 14px; border-radius: 50px; font-size: 0.78rem; font-weight: 800; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: rgba(240,230,255,0.55); transition: all 0.2s ease;
        }
        .genre-tag:hover { background: rgba(255,255,255,0.1); }
        .genre-tag.active { background: rgba(166,193,238,0.25); border-color: rgba(166,193,238,0.5); color: #c5d8f7; }

        /* === MOVIE GRID === */
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .movie-card {
            background: rgba(255,255,255,0.06); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px; overflow: hidden; cursor: pointer; position: relative;
            transition: transform 0.35s cubic-bezier(0.175,0.885,0.32,1.275), box-shadow 0.35s ease, border-color 0.3s ease;
            animation: cardIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both;
        }
        @keyframes cardIn { 0% { opacity: 0; transform: translateY(30px) scale(0.95); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        .movie-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.4); border-color: rgba(201,184,255,0.3); }

        .movie-poster { width: 100%; height: 220px; display: flex; align-items: center; justify-content: center; font-size: 4rem; position: relative; overflow: hidden; }
        .poster-0 { background: linear-gradient(135deg, #667eea, #764ba2); }
        .poster-1 { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .poster-2 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .poster-3 { background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .poster-4 { background: linear-gradient(135deg, #fa709a, #fee140); }
        .poster-5 { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
        .poster-6 { background: linear-gradient(135deg, #ffecd2, #fcb69f); }
        .poster-7 { background: linear-gradient(135deg, #84fab0, #8fd3f4); }

        .status-badge { position: absolute; top: 12px; right: 12px; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; }
        .badge-watch   { background: rgba(251,194,235,0.9); color: #6b2055; }
        .badge-watched { background: rgba(132,250,176,0.9); color: #0a5c30; }

        .fav-btn {
            position: absolute; top: 12px; left: 12px; width: 32px; height: 32px; border-radius: 50%;
            background: rgba(0,0,0,0.35); backdrop-filter: blur(6px); border: none; cursor: pointer; font-size: 0.95rem;
            display: flex; align-items: center; justify-content: center; transition: transform 0.2s ease, background 0.2s;
        }
        .fav-btn:hover { transform: scale(1.2); }
        .fav-btn.active { background: rgba(255,215,0,0.4); }

        /* Nút xóa phim */
        .del-btn {
            position: absolute; bottom: 12px; right: 12px; width: 32px; height: 32px; border-radius: 50%;
            background: rgba(255, 107, 107, 0.4); backdrop-filter: blur(6px); border: none; cursor: pointer; font-size: 0.95rem;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s ease;
        }
        .del-btn:hover { transform: scale(1.1); background: rgba(255, 107, 107, 0.8); }

        .movie-info { padding: 14px 16px 16px; }
        .movie-title { font-size: 0.95rem; font-weight: 800; margin: 0 0 6px; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .movie-meta { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
        .movie-year { font-size: 0.78rem; opacity: 0.5; font-weight: 700; }
        .movie-genre-tag { font-size: 0.7rem; font-weight: 800; padding: 3px 10px; border-radius: 20px; background: rgba(201,184,255,0.18); color: #c9b8ff; }

        /* Review / Bình luận */
        .movie-review {
            font-size: 0.8rem; font-style: italic; color: #e0d4ff; opacity: 0.85; margin-top: 10px;
            background: rgba(255,255,255,0.05); padding: 8px 10px; border-radius: 10px;
            border-left: 3px solid #fbc2eb; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        .mark-btn {
            width: 100%; margin-top: 10px; padding: 8px; border-radius: 14px; font-size: 0.78rem; font-weight: 800; font-family: inherit;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.06); color: rgba(240,230,255,0.7); transition: all 0.2s ease;
        }
        .mark-btn:hover { background: rgba(132,250,176,0.18); color: #84fab0; border-color: rgba(132,250,176,0.3); }
        .mark-btn.done  { background: rgba(132,250,176,0.15); color: #84fab0; border-color: rgba(132,250,176,0.3); }

        .empty-state { text-align: center; padding: 80px 20px; opacity: 0.5; }
        .empty-state .big-emoji { font-size: 4rem; display: block; margin-bottom: 16px; }
        .empty-state p { font-size: 1.1rem; font-weight: 700; }

        /* === MODALS === */
        .modal-backdrop {
            position: fixed; inset: 0; background: rgba(10,8,28,0.75); backdrop-filter: blur(8px); z-index: 500;
            display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .modal-backdrop.open { opacity: 1; visibility: visible; }
        .modal {
            background: linear-gradient(135deg, #1e1a3a, #16213e); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 28px; padding: 36px; width: 100%; max-width: 420px;
            transform: translateY(30px) scale(0.96); transition: transform 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        .modal-backdrop.open .modal { transform: translateY(0) scale(1); }
        .modal h2 { margin: 0 0 24px; font-size: 1.4rem; font-weight: 800; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 0.8rem; font-weight: 800; opacity: 0.6; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
        .form-input, .form-select {
            width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px; outline: none; color: #f0e6ff; font-family: inherit; font-size: 0.95rem; font-weight: 600; transition: all 0.25s;
        }
        .form-select option { background: #1a1a2e; }
        .form-input:focus, .form-select:focus { border-color: rgba(201,184,255,0.5); background: rgba(255,255,255,0.1); }
        .form-emoji-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .emoji-pick {
            width: 40px; height: 40px; border-radius: 12px; background: rgba(255,255,255,0.07); border: 2px solid transparent; cursor: pointer;
            font-size: 1.3rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .emoji-pick:hover { background: rgba(255,255,255,0.14); }
        .emoji-pick.selected { border-color: rgba(201,184,255,0.7); background: rgba(201,184,255,0.15); }
        .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
        .modal-cancel {
            flex: 1; padding: 12px; border-radius: 14px; font-family: inherit; font-size: 0.95rem; font-weight: 800; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.06); color: rgba(240,230,255,0.6); transition: all 0.2s;
        }
        .modal-cancel:hover { background: rgba(255,255,255,0.1); }
        .modal-save {
            flex: 2; padding: 12px; border-radius: 14px; font-family: inherit; font-size: 0.95rem; font-weight: 800; cursor: pointer; border: none;
            background: linear-gradient(135deg, #fbc2eb, #a6c1ee); color: #2a1a4e; transition: all 0.3s;
        }
        .modal-save:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(251,194,235,0.3); }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(201,184,255,0.3); border-radius: 3px; }
    </style>

<script>
window.addEventListener("supabase-ready", () => {

const supabase = window.supabase;
(function () {
    const canvas = document.getElementById('star-canvas'); const ctx = canvas.getContext('2d');
    let W, H, stars = [];
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    function makeStar() { return { x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.4 + 0.3, alpha: Math.random(), speed: 0.003 + Math.random() * 0.008, dir: Math.random() < 0.5 ? 1 : -1, }; }
    function init() { resize(); stars = Array.from({ length: 120 }, makeStar); }
    let last = null;
    function draw(ts) {
        if (!last) last = ts; const dt = Math.min((ts - last) / 1000, 0.05); last = ts;
        ctx.clearRect(0, 0, W, H);
        stars.forEach(s => {
            s.alpha += s.speed * s.dir * dt * 60;
            if (s.alpha > 1) { s.alpha = 1; s.dir = -1; } if (s.alpha < 0) { s.alpha = 0; s.dir = 1; }
            ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fillStyle = `rgba(220,210,255,${s.alpha})`; ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    window.addEventListener('resize', resize); init(); requestAnimationFrame(draw);
})();


let movies = [];

async function loadMovies() {

    const { data, error } = await supabase
        .from('movies')
        .select('*')
        .order('id', { ascending: false });

    if (error) {
        console.error(error);
        return;
    }

    movies = data || [];

    // Nếu database trống → thêm phim mặc định
    if (movies.length === 0) {

        await supabase
            .from('movies')
            .insert([
                {
                    title: 'Your Name',
                    year: 2016,
                    genre: 'Tình cảm',
                    status: 'watched',
                    fav: true,
                    emoji: '🌸',
                    posterIdx: 5,
                    review: 'Một bộ phim rất hay về sự kết nối.'
                },
                {
                    title: 'The Batman',
                    year: 2022,
                    genre: 'Hành động',
                    status: 'watch',
                    fav: false,
                    emoji: '🌙',
                    posterIdx: 2,
                    review: ''
                }
            ]);

        return loadMovies();
    }

    render();
}

let filterStatus = 'all'; let filterGenre = 'all'; let searchQuery = ''; let selectedEmoji = '🎬';
let currentReviewMovieId = null;


function render() {
    updateStats();
    const grid = document.getElementById('movieGrid');
    let list = movies.filter(m => {
        const matchStatus = filterStatus === 'all' ? true : filterStatus === 'fav' ? m.fav : m.status === filterStatus;
        const matchGenre  = filterGenre === 'all' ? true : m.genre === filterGenre;
        const matchSearch = m.title.toLowerCase().includes(searchQuery.toLowerCase());
        return matchStatus && matchGenre && matchSearch;
    });

    if (list.length === 0) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><span class="big-emoji">🎞️</span><p>Chưa có phim nào phù hợp~</p></div>`; return;
    }

    grid.innerHTML = list.map((m, i) => `
        <div class="movie-card" style="animation-delay:${i * 0.06}s">
            <div class="movie-poster poster-${(m.posterIdx ?? 0) % 8}">
                ${m.emoji}
                <span class="status-badge ${m.status === 'watched' ? 'badge-watched' : 'badge-watch'}">
                    ${m.status === 'watched' ? '✅ Đã xem' : '🍿 Muốn xem'}
                </span>
                <button class="fav-btn ${m.fav ? 'active' : ''}" onclick="toggleFav(${m.id})" title="Yêu thích">${m.fav ? '⭐' : '☆'}</button>
                <button class="del-btn" onclick="deleteMovie(${m.id})" title="Xóa khỏi list">🗑️</button>
            </div>
            <div class="movie-info">
                <div class="movie-title" title="${m.title}">${m.title}</div>
                <div class="movie-meta">
                    <span class="movie-year">${m.year}</span>
                    <span class="movie-genre-tag">${m.genre}</span>
                </div>
                ${m.review ? `<div class="movie-review">"${m.review}"</div>` : ''}
                <button class="mark-btn ${m.status === 'watched' ? 'done' : ''}" onclick="toggleWatched(${m.id})">
                    ${m.status === 'watched' ? '✅ Đã xem rồi' : '▷ Đánh dấu đã xem'}
                </button>
            </div>
        </div>
    `).join('');
}

function updateStats() {
    document.getElementById('statTotal').textContent = movies.length;
    document.getElementById('statWatch').textContent = movies.filter(m => m.status === 'watch').length;
    document.getElementById('statWatched').textContent = movies.filter(m => m.status === 'watched').length;
    document.getElementById('statFav').textContent = movies.filter(m => m.fav).length;
}
async function toggleFav(id) {

    const movie = movies.find(m => m.id === id);

    const { error } = await supabase
        .from('movies')
        .update({
            fav: !movie.fav
        })
        .eq('id', id);

    if(error) {
        console.error(error);
        return;
    }

    loadMovies();
}
async function deleteMovie(id) {

    if(confirm("Bạn có chắc chắn muốn xóa phim này khỏi danh sách?")) {

        const { error } = await supabase
            .from('movies')
            .delete()
            .eq('id', id);

        if(error) {
            console.error(error);
            return;
        }

        loadMovies();
    }
}

async function toggleWatched(id) {

    const m = movies.find(x => x.id === id);

    if (m.status === 'watch') {

        currentReviewMovieId = id;

        document.getElementById('inputReview').value = m.review || '';

        document.getElementById('reviewModalBackdrop').classList.add('open');

    } else {

        const { error } = await supabase
            .from('movies')
            .update({
                status: 'watch',
                review: ''
            })
            .eq('id', id);

        if(error) {
            console.error(error);
            return;
        }

        loadMovies();
    }
}

// Logic Modal Review
document.getElementById('reviewCancel').addEventListener('click', async () => {

    const { error } = await supabase
        .from('movies')
        .update({
            status: 'watched'
        })
        .eq('id', currentReviewMovieId);

    if(error) {
        console.error(error);
        return;
    }

    document.getElementById('reviewModalBackdrop').classList.remove('open');

    loadMovies();
});
document.getElementById('reviewSave').addEventListener('click', async () => {

    const { error } = await supabase
        .from('movies')
        .update({
            status: 'watched',
            review: document.getElementById('inputReview').value.trim()
        })
        .eq('id', currentReviewMovieId);

    if(error) {
        console.error(error);
        return;
    }

    document.getElementById('reviewModalBackdrop').classList.remove('open');

    loadMovies();
});

// Search & Filter
document.getElementById('searchInput').addEventListener('input', function () { searchQuery = this.value; render(); });
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function () {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active'); filterStatus = this.dataset.filter; render();
    });
});
document.querySelectorAll('.genre-tag').forEach(tag => {
    tag.addEventListener('click', function () {
        document.querySelectorAll('.genre-tag').forEach(t => t.classList.remove('active'));
        this.classList.add('active'); filterGenre = this.dataset.genre; render();
    });
});

// Modal Thêm Phim
document.getElementById('addBtn').addEventListener('click', () => { document.getElementById('modalBackdrop').classList.add('open'); document.getElementById('inputTitle').focus(); });
document.getElementById('modalCancel').addEventListener('click', closeModal);
function closeModal() {
    document.getElementById('modalBackdrop').classList.remove('open');
    document.getElementById('inputTitle').value = ''; document.getElementById('inputYear').value = '';
    selectedEmoji = '🎬'; document.querySelectorAll('.emoji-pick').forEach(b => b.classList.toggle('selected', b.dataset.emoji === '🎬'));
}
document.querySelectorAll('.emoji-pick').forEach(btn => {
    btn.addEventListener('click', function () { document.querySelectorAll('.emoji-pick').forEach(b => b.classList.remove('selected')); this.classList.add('selected'); selectedEmoji = this.dataset.emoji; });
});
document.getElementById('modalSave').addEventListener('click',async function () {
    const title = document.getElementById('inputTitle').value.trim();
    if (!title) { document.getElementById('inputTitle').style.borderColor = 'rgba(255,120,120,0.7)'; setTimeout(() => document.getElementById('inputTitle').style.borderColor = '', 1500); return; }
    const movie = {
    title: title,
    year: parseInt(document.getElementById('inputYear').value) || new Date().getFullYear(),
    genre: document.getElementById('inputGenre').value,
    status: document.getElementById('inputStatus').value,
    fav: false,
    emoji: selectedEmoji,
    posterIdx: movies.length % 8,
    review: ''
};

const { error } = await supabase
    .from('movies')
    .insert([movie]);

if(error) {
    console.error(error);
    return;
}

closeModal();

loadMovies();
});

loadMovies();
window.toggleFav = toggleFav;
window.deleteMovie = deleteMovie;
window.toggleWatched = toggleWatched;
    });
</script>
</body>
</html>
