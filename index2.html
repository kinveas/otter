<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trạm Giao Điểm - Hình Nhân</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦦</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">

    <style>
        /* === THIẾT LẬP CƠ BẢN & NỀN NHỊP THỞ (Ý TƯỞNG 3) === */
        body, html {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;

            /* LÀM NỀN NHỊP THỞ CHUYỂN MÀU PASTEL */
            /* Phối màu: Trắng -> Hồng nhạt -> Xanh lơ nhạt -> Tím nhạt */
            background: linear-gradient(-45deg, #ffffff, #ffe2ed, #e0f2fe, #f3e8ff, #ffffff);
            background-size: 400% 400%;

            /* Hiệu ứng thở: 15s cho 1 chu kỳ hít vào - thở ra */
            animation: gradientBreathe 15s ease infinite;
        }

        /* Khung hình (Keyframes) để background dịch chuyển qua lại */
        @keyframes gradientBreathe {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* === 1. LỚP QUỸ ĐẠO XOAY (ROTATING LAYER) === */
        .orbit-system {
            position: absolute;
            width: 1px;
            height: 1px;
            top: 50%;
            left: 50%;
            z-index: 1;
            animation: spinSystem 40s linear infinite;
        }

        @keyframes spinSystem {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* === 2. CÁC VẬT THỂ TRÊN QUỸ ĐẠO === */
        .orbit-item {
            position: absolute;
            transform: rotate(var(--angle)) translate(var(--radius));
        }

        .orbit-item img {
            position: absolute;
            width: var(--size);
            height: auto;

            /* Giữ nguyên Drop-shadow để ảnh nổi khối trên nền màu */
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.15));

            object-fit: cover;
            top: calc(var(--size) / -2);
            left: calc(var(--size) / -2);
            animation: counterSpin 40s linear infinite;
        }

        @keyframes counterSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }

        /* === 3. QUY TẮC: GẦN MỜ, XA RÕ === */
        .orbit-near img {
            --size: 80px;
            filter: blur(5px) drop-shadow(0px 5px 10px rgba(0,0,0,0.2));
            opacity: 0.4;
        }

        .orbit-mid img {
            --size: 130px;
            filter: blur(2px) drop-shadow(0px 8px 12px rgba(0,0,0,0.18));
            opacity: 0.75;
        }

        .orbit-far img {
            --size: 180px;
            filter: blur(0px) drop-shadow(0px 12px 20px rgba(0,0,0,0.15));
            opacity: 1;
        }

        /* === 4. TRUNG TÂM BẤM NÚT (CORE HUB) === */
        .core-hub {
            position: relative;
            z-index: 100;
            display: flex;
            gap: 30px;

            /* Tăng độ trong suốt của nền nút một chút để thấy màu nền Gradient thấu qua */
            background: rgba(255, 255, 255, 0.25);
            padding: 30px 40px;
            border-radius: 50px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }

        .btn {
            padding: 18px 45px;
            font-size: 1.2rem;
            font-weight: 700;
            font-family: inherit;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 0.5px;
        }

        .btn-study {
            background-color: #111;
            color: #fff;
            border: 2px solid #111;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .btn-study:hover {
            background-color: transparent;
            color: #111;
            transform: translateY(-3px);
        }

        .btn-chill {
            background-color: #fff;
            color: #111;
            border: 2px solid #eaeaea;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .btn-chill:hover {
            border-color: #111;
            transform: translateY(-3px);
        }

    </style>
</head>
<body>
<div class="transition-wipe" id="wipe">
    <div class="wipe-content">
        <span class="wipe-loader">🦦</span>
        <p>Đang đến Trạm Giao Điểm...</p>
    </div>
</div>

<style>
    .transition-wipe {
        position: fixed;
        top: 0;
        left: -100%; /* Nằm ngoài màn hình bên trái */
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); /* Màu cam hồng rái cá */
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: left 0.6s cubic-bezier(0.77, 0, 0.175, 1); /* Hiệu ứng lướt mượt */
    }

    /* Trạng thái khi đang lướt qua */
    .transition-wipe.active {
        left: 0;
    }

    /* Trạng thái khi thoát ra bên phải */
    .transition-wipe.exit {
        left: 100%;
    }

    .wipe-content {
        text-align: center;
        color: white;
        font-family: 'Quicksand', sans-serif;
    }

    .wipe-loader {
        font-size: 4rem;
        display: block;
        animation: otterJump 0.5s ease-in-out infinite alternate;
    }

    @keyframes otterJump {
        from { transform: translateY(0); }
        to { transform: translateY(-20px); }
    }
</style>
    <div class="orbit-system">

        <div class="orbit-item orbit-near" style="--angle: 0deg; --radius: 180px;">
            <img src="assets/3.png" alt="Hình 3">
        </div>
        <div class="orbit-item orbit-near" style="--angle: 120deg; --radius: 170px;">
            <img src="assets/4.png" alt="Hình 4">
        </div>
        <div class="orbit-item orbit-near" style="--angle: 240deg; --radius: 190px;">
            <img src="assets/5.png" alt="Hình 5">
        </div>

        <div class="orbit-item orbit-mid" style="--angle: 45deg; --radius: 320px;">
            <img src="assets/6.png" alt="Hình 6">
        </div>
        <div class="orbit-item orbit-mid" style="--angle: 165deg; --radius: 300px;">
            <img src="assets/7.png" alt="Hình 7">
        </div>
        <div class="orbit-item orbit-mid" style="--angle: 285deg; --radius: 340px;">
            <img src="assets/8.png" alt="Hình 8">
        </div>

        <div class="orbit-item orbit-far" style="--angle: 90deg; --radius: 480px;">
            <img src="assets/9.png" alt="Hình 9">
        </div>
        <div class="orbit-item orbit-far" style="--angle: 210deg; --radius: 460px;">
            <img src="assets/10.png" alt="Hình 10">
        </div>
        <div class="orbit-item orbit-far" style="--angle: 330deg; --radius: 490px;">
            <img src="assets/11.png" alt="Hình 11">
        </div>

    </div>

    <div class="core-hub">
        <a href="index3.html" class="btn btn-study" id="btn-study">Học tập 📚</a>
        <a href="index4.html" class="btn btn-chill" id="btn-chill">Phim ảnh 🍿</a>
    </div>

    <script>
        const wipe = document.getElementById('wipe');
        const btnStudy = document.getElementById('btn-study');
        const btnChill = document.getElementById('btn-chill');

        // Hàm xử lý chuyển trang kèm hiệu ứng lướt
        function navigateWithTransition(e, targetUrl) {
            e.preventDefault(); // Chặn chuyển trang ngay lập tức

            // Kích hoạt tấm màn lướt vào
            wipe.classList.add('active');

            // Đợi hiệu ứng lướt xong (khoảng 0.65s) rồi mới chuyển trang
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 650);
        }

        // Gán sự kiện cho nút Học tập (Sang index3.html)
        btnStudy.addEventListener('click', function(e) {
            navigateWithTransition(e, 'index3.html');
        });

        // Gán sự kiện cho nút Phim ảnh (Sang index4.html)
        btnChill.addEventListener('click', function(e) {
            navigateWithTransition(e, 'index4.html');
        });
    </script>
</body>
</html>
